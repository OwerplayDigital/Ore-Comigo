<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ore Comigo | Oficial</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #6d8299; --a: #d4a373; --bg: #f4f7f6; --w: #ffffff; --t: #2d3436; --h: #e74c3c; --f: #f1c40f; --s: #27ae60; --modal-bg: rgba(0,0,0,0.5); --item-bg: rgba(109,130,153,0.08); }
        body.dark-mode { --bg: #1a1a2e; --w: #16213e; --t: #e9ecef; --p: #a2b2c8; --modal-bg: rgba(0,0,0,0.8); --item-bg: rgba(255,255,255,0.05); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--t); display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 175px; background: var(--w); border-right: 1px solid rgba(0,0,0,0.05); height: 100vh; position: fixed; left: 0; top: 0; display: flex; flex-direction: column; padding: 15px 10px; z-index: 1000; }
        .sidebar h1 { font-family: 'Playfair Display'; color: var(--p); text-align: center; margin-bottom: 20px; font-size: 22px; letter-spacing: -0.5px; padding-bottom: 8px; border-bottom: 1px solid var(--item-bg); }
        .nav-group { display: flex; flex-direction: column; gap: 8px; }
        .nav-item { padding: 10px 12px; border-radius: 12px; cursor: pointer; color: var(--t); font-weight: 700; font-size: 12px; display: flex; align-items: center; gap: 8px; transition: 0.2s; background: var(--item-bg); }
        .nav-item.active { background: var(--p); color: white; box-shadow: 0 4px 10px rgba(109,130,153,0.15); }
        .item-apoio { background: rgba(231, 76, 60, 0.08); color: var(--h); }
        .item-share { background: rgba(39, 174, 96, 0.08); color: var(--s); }
        .item-theme { border: 1px dashed rgba(0,0,0,0.1); background: transparent; }
        main { flex: 1; margin-left: 175px; padding: 15px; height: 100vh; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }
        .screen { display: none; width: 100%; max-width: 400px; animation: fadeIn 0.3s ease-out; padding-bottom: 80px; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .card-cat { background: var(--w); padding: 15px 5px; border-radius: 18px; text-align: center; cursor: pointer; border: 1px solid rgba(0,0,0,0.05); }
        .card-cat div { font-size: 22px; margin-bottom: 5px; }
        .card-cat span { display: block; font-weight: 700; font-size: 9px; color: var(--p); text-transform: uppercase; letter-spacing: 0.4px; }
        .ora-item { background: var(--w); padding: 12px 15px; border-radius: 14px; margin-bottom: 10px; cursor: pointer; border-left: 4px solid var(--p); box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .ora-item strong { display: block; font-size: 14px; color: var(--t); margin-bottom: 2px; }
        .ora-item small { display: block; font-size: 11px; color: var(--a); font-weight: 600; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--modal-bg); z-index: 2000; justify-content: center; align-items: center; padding: 20px; backdrop-filter: blur(5px); }
        .m-box { background: var(--w); padding: 25px; border-radius: 25px; width: 100%; max-width: 330px; text-align: left; position: relative; max-height: 85vh; overflow-y: auto; }
        .m-box h3 { text-align: center; margin-bottom: 15px; color: var(--p); font-family: 'Playfair Display'; }
        /* CORREÇÃO DO ESPAÇAMENTO AQUI */
        .m-box p { font-size: 15px; line-height: 1.5; text-align: left; white-space: normal; word-spacing: normal; color: var(--t); }
        .m-box small { display: block; text-align: center; margin-top: 15px; color: var(--a); font-weight: 700; }
        .btn-amen { display: block; margin: 20px auto 0; padding: 12px 40px; border: none; background: var(--p); color: white; border-radius: 20px; font-weight: 700; cursor: pointer; }
        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #2d3436; color: white; padding: 10px 20px; border-radius: 25px; font-size: 13px; z-index: 3000; opacity: 0; transition: 0.3s; }
        #toast.show { opacity: 1; }
        @media (max-width: 600px) { .sidebar { width: 150px; padding: 10px 5px; } main { margin-left: 150px; } .sidebar h1 { font-size: 18px; } .nav-item { font-size: 10px; } }
    </style>
</head>
<body>
    <div id="toast">Ação realizada!</div>
    <aside class="sidebar">
        <h1>Ore Comigo</h1>
        <div class="nav-group">
            <div class="nav-item active" onclick="show('home', this)">🏠 Início</div>
            <div class="nav-item" onclick="show('list', this)">📖 Orações</div>
            <div class="nav-item" onclick="show('favs', this)">⭐ Favoritos</div>
            <div class="nav-item item-apoio" onclick="show('donate', this)">❤️ Apoie o Projeto</div>
            <div class="nav-item item-share" onclick="shareApp()">🔗 Compartilhar</div>
            <div class="nav-item item-theme" onclick="toggleTheme()">
                <span id="theme-icon">☀️</span> <span id="theme-text">Modo Claro</span>
            </div>
        </div>
    </aside>
    <main id="main-content">
        <section id="home" class="screen active">
            <div style="background: linear-gradient(135deg, #6d8299, #8da9c4); color:white; padding:35px 20px; border-radius:25px; text-align:center;">
                <h2 style="font-family:'Playfair Display'; font-size: 22px;">Seja Bem-vindo</h2>
                <div style="height: 2px; background: rgba(255,255,255,0.3); width: 30px; margin: 12px auto;"></div>
                <p id="msg-dia" style="font-size:14px; font-style:italic;"></p>
            </div>
            <button onclick="randomO()" style="margin-top:25px; background:var(--w); border:1px solid #ddd; padding:18px; border-radius:22px; width:100%; color:var(--p); font-weight:700; cursor:pointer;">✨ Receber uma Palavra</button>
        </section>
        <section id="list" class="screen">
            <div id="cat-menu" class="grid">
                <div class="card-cat" onclick="openCat('paz')"><div>🕊️</div><span>PAZ</span></div>
                <div class="card-cat" onclick="openCat('familia')"><div>🏠</div><span>FAMÍLIA</span></div>
                <div class="card-cat" onclick="openCat('gratidao')"><div>🙏</div><span>GRATIDÃO</span></div>
                <div class="card-cat" onclick="openCat('perdao')"><div>🔓</div><span>PERDÃO</span></div>
                <div class="card-cat" onclick="openCat('prosperidade')"><div>💰</div><span>PROSPERIDADE</span></div>
                <div class="card-cat" onclick="openCat('saude')"><div>🌿</div><span>SAÚDE</span></div>
                <div class="card-cat" onclick="openCat('protecao')"><div>🛡️</div><span>PROTEÇÃO</span></div>
                <div class="card-cat" onclick="openCat('sabedoria')"><div>💡</div><span>SABEDORIA</span></div>
                <div class="card-cat" onclick="openCat('forca')"><div>💪</div><span>FORÇA</span></div>
                <div class="card-cat" onclick="openCat('filhos')"><div>👶</div><span>FILHOS</span></div>
            </div>
            <div id="ora-container" style="display:none"></div>
        </section>
        <section id="favs" class="screen"><h3 style="text-align:center; color:var(--p); margin-bottom:20px;">Favoritos</h3><div id="fav-list"></div></section>
        <section id="donate" class="screen"><h3 style="text-align:center; color:var(--p);">Apoie o Projeto</h3><div style="cursor:pointer; padding:30px; border:2px solid var(--p); border-radius:22px; text-align:center; margin-top:20px; background:var(--w);" onclick="copyPix('65173337000146')"><p>Toque para copiar o PIX</p></div></section>
    </main>
    <div id="modal" class="modal" onclick="closeM()"><div class="m-box" onclick="event.stopPropagation()"><div id="btn-fav-modal" style="position:absolute; top:15px; right:15px; font-size:24px; cursor:pointer;">☆</div><h3 id="mt"></h3><p id="mm"></p><small id="mr"></small><button class="btn-amen" onclick="closeM()">Amém</button></div></div>
    <script>
        const db = {
            paz: [{id:"p1",t:"Paz no Coração",r:"João 14:27",m:"Senhor meu Deus, entro em Tua presença agora pedindo que Tua paz, que excede todo o entendimento, inunde o meu coração. Afasta de mim toda ansiedade e medo que tentam roubar o meu sono e a minha alegria. Que eu possa descansar na certeza de que Tu tens o controle de todas as coisas em Tuas mãos. Amém."},{id:"p2",t:"Descanso em Deus",r:"Salmos 4:8",m:"Pai amado, obrigado por este dia. Ao me deitar, entrego todas as minhas preocupações a Ti. Peço que prepares um descanso reparador para o meu corpo e para a minha alma. Que o Teu Espírito Santo traga tranquilidade à minha mente, permitindo que eu durma em paz, pois sei que Tu me guardas com fidelidade."},{id:"p3",t:"Calma na Alma",r:"Filipenses 4:7",m:"Senhor, acalma as tempestades que porventura estejam agitando o meu interior. Que a Tua paz guarde os meus pensamentos e as minhas emoções em Cristo Jesus. Ajuda-me a não me inquietar com o amanhã, mas a confiar plenamente na Tua providência e no Teu cuidado constante."},{id:"p4",t:"Refúgio Seguro",r:"Salmos 91:1",m:"Deus, Tu és o meu refúgio e a minha fortaleza. Peço que eu possa habitar sob a Tua sombra protetora hoje. Livra-me de todo o mal e que a Tua presença seja o meu lugar de descanso e segurança em meio às tribulações do mundo. Em Ti confio o meu destino."},{id:"p5",t:"Serenidade Diária",r:"Mateus 11:28",m:"Jesus, aceito o Teu convite para ir até Ti. Entrego o meu cansaço e os meus fardos pesados aos Teus pés. Troca a minha angústia pela Tua leveza e dá-me a serenidade necessária para caminhar com fé, sabendo que o Teu jugo é suave e o Teu fardo é leve."},{id:"p6",t:"Confiança Inabalável",r:"Isaías 26:3",m:"Senhor, conserva em paz a minha mente, porque em Ti confio. Afasta as dúvidas que tentam balançar a minha fé. Que eu possa manter os meus olhos fixos em Ti, sabendo que és a Rocha Eterna que nunca falha e que traz estabilidade à minha vida."},{id:"p7",t:"Silêncio de Deus",r:"Salmos 46:10",m:"Pai, ajuda-me a aquietar o meu espírito e a reconhecer que Tu és Deus. Em meio ao barulho e à pressa do dia a dia, ensina-me a buscar o silêncio da Tua presença, onde encontro renovação e as respostas que tanto procuro para o meu coração."},{id:"p8",t:"Luz na Escuridão",r:"João 8:12",m:"Jesus, Tu és a luz do mundo. Ilumina os cantos escuros da minha alma com a Tua paz. Que eu nunca ande em trevas, mas que a luz da Tua palavra guie os meus passos e traga clareza aos meus pensamentos e decisões. Amém."},{id:"p9",t:"Consolo Divino",r:"Salmos 23:4",m:"Senhor, mesmo quando eu caminhar pelo vale da sombra da morte, não temerei mal algum, pois Tu estás comigo. Que a Tua vara e o Teu cajado me consolem e me tragam a paz necessária para enfrentar qualquer adversidade com a cabeça erguida e o coração calmo."},{id:"p10",t:"Paz Profunda",r:"Colossenses 3:15",m:"Que a paz de Cristo seja o árbitro em meu coração. Em todas as minhas escolhas e relacionamentos, que a harmonia prevaleça. Sou grato por pertencer a um corpo que busca a paz, e peço que essa virtude transborde da minha vida para todos ao meu redor."}],
            familia: [{id:"f1",t:"Bênção para o Lar",r:"Josué 24:15",m:"Senhor, consagro minha casa e minha família a Ti. Que o Teu amor seja o alicerce do nosso lar e que a Tua presença seja sentida em cada cômodo. Protege-nos de todo o mal, afasta as discussões e que a união prevaleça entre nós. Que em minha casa, todos possamos servir a Ti com alegria e gratidão."},{id:"f2",t:"União Familiar",r:"Salmos 133:1",m:"Deus de amor, peço que derrames Tua bênção de união sobre meus familiares. Remove toda barreira de orgulho ou mágoa que possa existir entre nós. Ensina-nos a perdoar, a ter paciência uns com os outros e a valorizar cada momento que passamos juntos. Que a nossa harmonia seja um testemunho da Tua graça."},{id:"f3",t:"Proteção do Lar",r:"Números 6:24",m:"Senhor, abençoa e guarda cada membro da minha família. Que o Teu rosto resplandeça sobre nós e tenhamos a Tua misericórdia. Que em nossa casa haja sempre provisão, saúde e um ambiente de paz, onde o Teu nome seja honrado acima de tudo. Amém."},{id:"f4",t:"Amor Sacrificial",r:"1 Coríntios 13:13",m:"Pai, ensina-nos a amar uns aos outros como Tu nos amas. Que a paciência, a bondade e a compreensão sejam as marcas do nosso convívio. Ajuda-nos a suportar as falhas uns dos outros e a construir uma relação baseada no respeito mútuo e na caridade cristã."},{id:"f5",t:"Sabedoria para Pais",r:"Provérbios 22:6",m:"Senhor, dá-me sabedoria para guiar meus familiares pelos caminhos da retidão. Que eu saiba instruir com amor e ser um exemplo vivo da Tua palavra. Que as gerações que vêm de mim cresçam conhecendo e amando ao Senhor de todo o coração."},{id:"f6",t:"Respeito Mútuo",r:"Efésios 6:1",m:"Deus, peço que o respeito seja o pilar dos nossos relacionamentos familiares. Que os filhos honrem os pais e os pais tratem os filhos com carinho e equilíbrio. Que não haja espaço para palavras rudes, mas sim para o encorajamento e para a edificação mútua em Cristo."},{id:"f7",t:"Paz nas Conversas",r:"Provérbios 15:1",m:"Senhor, guarda a nossa boca. Que tenhamos respostas brandas que desviem o furor e palavras que tragam vida. Afasta todo espírito de contenda do nosso meio e que a comunicação entre nós seja sempre clara, honesta e cheia da Tua graça divina."},{id:"f8",t:"Prosperidade no Lar",r:"Salmos 128:3",m:"Pai amado, abençoa o fruto do nosso trabalho e que a prosperidade habite em nossa casa. Que não nos falte o pão de cada dia e que possamos desfrutar das Tuas bênçãos com alegria e gratidão, sempre colocando o Reino de Deus em primeiro lugar."},{id:"f9",t:"Edificação da Casa",r:"Provérbios 14:1",m:"Senhor, dá-nos sabedoria para edificar o nosso lar. Que sejamos prudentes na administração dos bens e na condução da nossa rotina. Que a nossa casa seja um lugar de refúgio e renovação para todos que nela entrarem, refletindo a Tua glória."},{id:"f10",t:"Aliança Eterna",r:"Gênesis 17:7",m:"Deus fiel, lembro-me da Tua aliança. Peço que a Tua mão esteja sobre a minha descendência. Que meus filhos e os filhos deles conheçam a Tua fidelidade e vivam sob a Tua proteção e direção por todas as gerações. Tu és o nosso Deus hoje e para sempre."}],
            gratidao: [{id:"g1",t:"Gratidão Diária",r:"1 Tess. 5:18",m:"Meu Deus, hoje eu não quero pedir nada, apenas agradecer. Obrigado pela vida, pelo fôlego, pela saúde e por todas as bênçãos que recebi, tanto as visíveis quanto as que nem percebi. Obrigado por me sustentar nos momentos difíceis e por nunca me abandonar."},{id:"g2",t:"Coração Grato",r:"Salmos 100:4",m:"Senhor, entro em Teus átrios com louvor. Agradeço pela Tua bondade que dura para sempre e pela Tua fidelidade que se estende por todas as gerações. Obrigado por ser o meu Pai e por cuidar de cada detalhe da minha jornada com tanto carinho e perfeição."},{id:"g3",t:"Pelo Pão",r:"Mateus 6:11",m:"Pai Celeste, obrigado pelo alimento à minha mesa. Agradeço pelo trabalho que provê o sustento e pela Tua provisão que nunca falha. Que eu saiba sempre valorizar o que tenho e ser generoso com aqueles que passam necessidade. Amém."},{id:"g4",t:"Dom da Vida",r:"Salmos 118:24",m:"Este é o dia que o Senhor fez; nele me alegrarei e me regozijarei. Obrigado pela oportunidade de viver mais este dia, de ver o sol nascer e de ter novas chances de ser uma pessoa melhor. A vida é um presente Teu e eu a celebro com gratidão."},{id:"g5",t:"Bênçãos",r:"Salmos 103:2",m:"Minha alma, bendiga ao Senhor e não se esqueça de nenhum de seus benefícios. Agradeço pela cura, pelo livramento, pelas portas abertas e por cada resposta de oração. Tu és um Deus generoso e eu reconheço que tudo o que sou e tenho vem de Ti."},{id:"g6",t:"Pela Salvação",r:"João 3:16",m:"Obrigado, Jesus, pelo Teu sacrifício na cruz. Agradeço por me amar de tal maneira que deste a Tua vida por mim. Minha maior gratidão é pela certeza da salvação e pela vida eterna que tenho em Ti. Sou livre e perdoado pelo Teu sangue."},{id:"g7",t:"Pela Força",r:"Salmos 28:7",m:"Senhor, obrigado por ser a minha força e o meu escudo. Agradeço porque, quando me senti fraco, Tu me levantaste. Quando o medo tentou me paralisar, o Teu amor me encorajou. Obrigado por ser o meu sustento constante em todas as batalhas."},{id:"g8",t:"Pelo Socorro",r:"Salmos 121:1",m:"Elevo meus olhos para os montes e agradeço porque o meu socorro vem do Senhor. Obrigado por me guardar de todo o mal e por não permitir que meus pés tropecem. Tua vigilância sobre a minha vida é o motivo da minha gratidão e segurança."},{id:"g9",t:"Pela Paz",r:"2 Tess. 3:16",m:"Obrigado, Senhor da paz, por me dar paz em todo o tempo e de todas as maneiras. Agradeço por essa paz que acalma o meu coração mesmo quando o mundo ao redor está em caos. Ter a Tua presença comigo é o meu maior motivo de gratidão."},{id:"g10",t:"Pelo Amor",r:"1 João 4:19",m:"Agradeço, Pai, porque me amaste primeiro. Obrigado porque o Teu amor é incondicional e não depende dos meus méritos. Que a minha gratidão se transforme em ações de amor para com o próximo, refletindo a Tua luz e a Tua bondade em tudo o que eu fizer."}],
            perdao: [{id:"pe1",t:"Coração Puro",r:"Salmos 51:10",m:"Senhor, reconheço minhas falhas e peço Teu perdão. Lava o meu coração de todo pecado e renova em mim um espírito inabalável. Ajuda-me também a perdoar aqueles que me feriram, tirando de mim qualquer peso de mágoa ou amargura."},{id:"pe2",t:"Perdoar Sempre",r:"Mateus 18:22",m:"Senhor, ensina-me a perdoar não apenas sete vezes, mas setenta vezes sete. Que o meu coração seja livre de rancores e que eu tenha a humildade de pedir perdão quando errar. Que o Teu exemplo de amor na cruz me inspire a liberar perdão."},{id:"pe3",t:"Misericórdia",r:"Lucas 6:36",m:"Pai, peço que a Tua misericórdia me alcance hoje. Assim como recebo o Teu perdão generoso, ajuda-me a ser misericordioso com os erros alheios. Que eu não seja um juiz severo, mas um canal da Tua graça e do Teu amor restaurador para com o próximo."},{id:"pe4",t:"Libertação",r:"João 8:36",m:"Senhor Jesus, obrigado porque o Teu perdão me traz verdadeira liberdade. Peço que me libertes das correntes da culpa e do remorso. Que eu aceite o Teu perdão e consiga caminhar para frente, focando nas novas oportunidades que Tu preparas."},{id:"pe5",t:"Arrependimento",r:"1 João 1:9",m:"Deus fiel e justo, venho confessar os meus pecados diante de Ti. Arrependo-me de tudo o que fiz que te entristeceu. Obrigado por me purificar de toda a injustiça e por me dar a chance de recomeçar com a consciência limpa e o coração renovado."},{id:"pe6",t:"Novas Criaturas",r:"2 Cor. 5:17",m:"Senhor, agradeço porque em Cristo as coisas velhas já passaram e tudo se fez novo. Peço que o meu passado não tenha poder sobre o meu presente. Que o Teu perdão me transforme diariamente em uma pessoa melhor, mais parecida com Jesus."},{id:"pe7",t:"Paz com o Próximo",r:"Efésios 4:32",m:"Pai, ajuda-me a ser bondoso e compassivo. Que eu possa perdoar os outros assim como Tu me perdoaste em Cristo. Remove toda a amargura, ira e maledicência do meu vocabulário e do meu coração, para que eu viva em paz com todos."},{id:"pe8",t:"Limpeza",r:"Isaías 1:18",m:"Senhor, Tu prometeste que, se nossos pecados fossem como o escarlate, ficariam brancos como a neve. Agradeço por essa limpeza profunda em minha alma. Que eu valorize esse sacrifício e procure viver uma vida santa e agradável aos Teus olhos."},{id:"pe9",t:"Amor Restaurador",r:"1 Pedro 4:8",m:"Deus, que o amor prevaleça sobre os meus julgamentos. Ensina-me que o amor cobre uma multidão de pecados. Que eu prefira amar e perdoar do que ter razão, construindo pontes de restauração em vez de muros de separação em meus relacionamentos."},{id:"pe10",t:"Recomeço",r:"Lamentações 3:22",m:"Obrigado, Senhor, porque Tuas misericórdias se renovam a cada manhã. Peço que este novo dia seja marcado pelo Teu perdão e por uma nova disposição em seguir os Teus caminhos. Que eu não repita os erros de ontem e viva plenamente a Tua vontade hoje. Amém."}],
            prosperidade: [{id:"pr1",t:"Portas de Trabalho",r:"Salmos 90:17",m:"Pai das Luzes, peço Tua direção e bênção sobre a minha vida profissional. Abre portas de oportunidades onde não vejo saída e abençoa o trabalho das minhas mãos. Que eu seja produtivo e que o fruto do meu esforço seja suficiente para suprir minhas necessidades."},{id:"pr2",t:"Abundância",r:"Filipenses 4:19",m:"Senhor, confio na Tua promessa de que suprirás todas as minhas necessidades segundo as Tuas riquezas em glória. Afasta de mim o medo da escassez e dá-me a fé para acreditar que Tu és o meu provedor. Que a abundância de Deus se manifeste em minha vida."},{id:"pr3",t:"Sucesso",r:"Josué 1:8",m:"Pai, ajuda-me a meditar na Tua palavra dia e noite. Que eu seja obediente aos Teus princípios para que o meu caminho seja próspero e eu tenha bom sucesso. Que meus projetos estejam alinhados com a Tua vontade e que eu colha os frutos da minha dedicação."},{id:"pr4",t:"Fidelidade",r:"2 Coríntios 9:6",m:"Senhor, ensina-me a ser um semeador generoso. Que eu entenda que quem semeia com fartura, com fartura também colherá. Abençoa a minha vida financeira para que eu tenha sempre o suficiente para mim e transborde em boas obras para o Teu Reino."},{id:"pr5",t:"Honra ao Senhor",r:"Provérbios 3:9",m:"Deus, entrego a Ti as primícias de tudo o que recebo. Reconheço que tudo vem de Ti e quero te honrar com os meus bens. Que os meus celeiros sejam cheios e que eu tenha sabedoria para administrar cada centavo com responsabilidade e temor ao Senhor."},{id:"pr6",t:"Força",r:"Deuteronômio 8:18",m:"Senhor, agradeço pela saúde e pela inteligência que me dás para adquirir riquezas. Não permitas que o meu coração se envaideça, mas que eu sempre me lembre de que és Tu quem me dá a força e a capacidade para prosperar e cumprir a Tua aliança."},{id:"pr7",t:"Janelas do Céu",r:"Malaquias 3:10",m:"Pai amado, coloco minha fidelidade à prova da Tua promessa. Abre as janelas do céu e derrama sobre mim bênção tal que não haja lugar suficiente para a recolher. Repreende o devorador da minha vida financeira e que a prosperidade seja constante."},{id:"pr8",t:"Cálice Transbordante",r:"Salmos 23:5",m:"Senhor, Tu preparas uma mesa perante mim na presença dos meus inimigos. Unges a minha cabeça com óleo e o meu cálice transborda. Agradeço pela fartura espiritual e material que tens derramado sobre mim, permitindo que eu viva com dignidade e paz."},{id:"pr9",t:"Bênção",r:"Deuteronômio 28:3",m:"Deus de Abraão, eu recebo a Tua bênção sobre tudo o que eu fizer. Que eu seja bendito ao sair e ao entrar. Que o meu negócio, o meu emprego e os meus investimentos floresçam, trazendo segurança para a minha família e glória para o Teu nome."},{id:"pr10",t:"Prioridade",r:"Mateus 6:33",m:"Senhor, meu compromisso é buscar primeiro o Teu Reino e a Tua justiça. Confio que, ao fazer isso, todas as outras coisas me serão acrescentadas. Dá-me paz para não andar ansioso e sabedoria para viver a prosperidade que vem de uma vida Contigo. Amém."}],
            saude: [{id:"s1",t:"Cura Divina",r:"Êxodo 15:26",m:"Senhor, Tu és o Médico dos médicos. Peço que estendas Tua mão poderosa sobre o meu corpo e restaure a minha saúde. Fortalece o meu sistema imunológico, traz vigor aos meus ossos e cura toda enfermidade física ou emocional. Eu confio na Tua palavra."},{id:"s2",t:"Restauração",r:"Jeremias 30:17",m:"Pai, Tu prometeste que trarias restauração e cura para as feridas. Peço que essa promessa se cumpra na minha vida hoje. Remove qualquer dor, inflamação ou desequilíbrio do meu organismo. Que a vitalidade do Teu Espírito flua através de mim, trazendo saúde total."},{id:"s3",t:"Renovo de Forças",r:"Isaías 40:31",m:"Senhor, quando me sinto cansado e fraco, busco em Ti o renovo. Que eu possa voar como águia, correr e não me cansar, caminhar e não fatigar. Dá-me a energia necessária para cumprir minhas tarefas com saúde e disposição, confiando sempre no Teu sustento."},{id:"s4",t:"Saúde da Mente",r:"Provérbios 4:22",m:"Deus, Tua palavra é vida para quem a encontra e saúde para todo o corpo. Ajuda-me a guardar os Teus ensinamentos em meu coração. Que a minha mente seja limpa de pensamentos negativos e que o meu corpo reflita a paz e o equilíbrio que vêm de Ti."},{id:"s5",t:"Fé que Restaura",r:"Mateus 9:22",m:"Jesus, assim como curaste tantos enfermos com um toque ou uma palavra, peço o Teu milagre em minha vida. Aumenta a minha fé para que eu receba a cura completa. Que o meu testemunho de saúde recuperada sirva para exaltar o Teu santo nome. Amém."},{id:"s6",t:"Cura das Emoções",r:"Salmos 147:3",m:"Senhor, Tu saras os quebrantados de coração e pensas as suas feridas. Peço que cures as mágoas do meu passado e toda dor emocional que adoece o meu corpo. Traz alegria ao meu espírito, pois sei que o coração alegre é um bom remédio."},{id:"s7",t:"Prosperidade",r:"3 João 1:2",m:"Amado Deus, desejo que eu tenha saúde em tudo e que prospere, assim como prospera a minha alma. Que haja equilíbrio entre o meu bem-estar físico e a minha vida espiritual. Cuida do meu corpo, que é o Teu templo, e dá-me sabedoria para cuidar dele."},{id:"s8",t:"Alívio",r:"Mateus 11:28",m:"Jesus, venho a Ti buscar alívio. Se houver dor ou desconforto persistente, peço que tragas o Teu consolo e a Tua cura. Que eu sinta o Teu abraço protetor e que o Teu poder se manifeste restaurando cada célula do meu ser conforme a Tua vontade."},{id:"s9",t:"Toque de Vida",r:"Marcos 5:34",m:"Senhor, creio que apenas um toque Teu pode mudar a minha situação de saúde. Vai em paz e sê curada — quero ouvir essa palavra no meu coração. Recebo a Tua saúde e decido viver de forma que honre a vida que Tu me deste. Obrigado por Tua bondade."},{id:"s10",t:"Proteção",r:"1 Coríntios 6:19",m:"Espírito Santo, habita em mim e traz ordem ao meu organismo. Ajuda-me a fazer escolhas saudáveis, a descansar o necessário e a nutrir o meu corpo adequadamente. Que a saúde seja a minha porção diária para que eu possa servir ao Senhor com todas as minhas forças. Amém."}],
            protecao: [{id:"pt1",t:"Anjos",r:"Salmos 34:7",m:"Meu Deus, peço que acampes Teus anjos ao meu redor e da minha família. Livra-nos de assaltos, acidentes e de todo o laço do inimigo. Que Tua mão protetora nos guarde em nossas saídas e entradas, tanto de dia quanto de noite. Somos Teus e confiamos na Tua proteção."},{id:"pt2",t:"Escudo Fiel",r:"Salmos 91:4",m:"Senhor, cobre-me com as Tuas penas e sob as Tuas asas estarei seguro. Que a Tua fidelidade seja o meu escudo e a minha proteção contra as setas inflamadas do mal. Não temerei o pavor da noite nem a seta que voa de dia, pois Tu és o meu guarda fiel."},{id:"pt3",t:"Livramento",r:"Salmos 121:7",m:"O Senhor me guardará de todo o mal; Ele guardará a minha alma. Agradeço, Pai, por esse cuidado constante. Que nenhum mal me atinja e nenhuma praga chegue à minha tenda. Caminho com confiança porque sei que Aquele que me guarda não dorme."},{id:"pt4",t:"Torre Forte",r:"Provérbios 18:10",m:"Senhor, o Teu nome é uma torre forte para a qual eu corro e encontro segurança. Quando eu me sentir ameaçado ou vulnerável, lembra-me de invocar o Teu nome. Que a Tua proteção seja uma barreira intransponível contra qualquer ataque espiritual ou físico. Amém."},{id:"pt5",t:"Cuidado",r:"1 Pedro 5:7",m:"Deus, lanço sobre Ti toda a minha ansiedade sobre segurança. Obrigado por cuidar de mim com tanta dedicação. Sei que estou na palma da Tua mão e que nada acontece sem a Tua permissão. Descanso no Teu cuidado e na Tua proteção soberana sobre a minha vida."},{id:"pt6",t:"Presença",r:"Mateus 28:20",m:"Jesus, obrigado pela promessa de que estarias conosco todos os dias, até a consumação dos séculos. Essa presença é a minha maior segurança. Que eu sinta a Tua companhia em cada lugar que eu for, sabendo que nunca estou sozinho diante dos perigos do mundo."},{id:"pt7",t:"Segurança",r:"Provérbios 1:33",m:"Senhor, ajuda-me a dar ouvidos à Tua voz e a seguir os Teus conselhos. Sei que, ao caminhar na Tua vontade, habitarei seguro e estarei tranquilo, sem receio do mal. Que a Tua sabedoria seja a minha guia e a minha proteção contra as escolhas erradas."},{id:"pt8",t:"Vitória",r:"Romanos 8:31",m:"Pai, se Tu és por nós, quem será contra nós? Com essa certeza, enfrento o dia sem medo. Nenhuma arma forjada contra mim prosperará e nenhuma condenação terá poder sobre a minha vida. Sou mais que vencedor por meio daquele que me amou."},{id:"pt9",t:"Muro de Fogo",r:"Zacarias 2:5",m:"Senhor, sê para mim e para a minha casa um muro de fogo ao redor. Que a Tua glória esteja no meio de nós, impedindo a entrada de qualquer influência negativa ou destrutiva. Que o nosso ambiente seja santificado e protegido pela Tua presença majestosa. Amém."},{id:"pt10",t:"Guarda",r:"Salmos 121:4",m:"Obrigado, Deus, porque o guarda de Israel não dorme. Agradeço por Tua vigilância 24 horas sobre a minha vida. Posso trabalhar, descansar e viajar com o coração em paz, sabendo que o Criador dos céus e da terra é o meu protetor pessoal e infalível."}],
            sabedoria: [{id:"sb1",t:"Direção",r:"Tiago 1:5",m:"Pai Celeste, peço que me concedas sabedoria e discernimento para tomar as decisões corretas. Que eu não me guie pelo meu próprio entendimento, mas pela Tua voz. Ilumina o meu caminho para que eu saiba como agir em cada situação e como falar com as pessoas."},{id:"sb2",t:"Discernimento",r:"Provérbios 2:6",m:"Senhor, Tu és a fonte de todo o conhecimento. Peço que dês discernimento para distinguir o certo do errado e o melhor do apenas bom. Que o meu coração seja sensível à Tua instrução e que eu tenha a inteligência espiritual necessária para viver agradavelmente a Ti."},{id:"sb3",t:"Entendimento",r:"Provérbios 4:7",m:"Deus, ajuda-me a buscar a sabedoria acima de qualquer riqueza material. Que eu tenha entendimento sobre as circunstâncias da vida e saiba aprender com cada experiência. Que a Tua verdade seja o fundamento de todos os meus pensamentos e planos para o futuro. Amém."},{id:"sb4",t:"Caminho",r:"Salmos 32:8",m:"Senhor, instrui-me e ensina-me o caminho que devo seguir; guia-me com os Teus olhos. Não permitas que eu me desvie para a direita ou para a esquerda. Que a Tua luz brilhe sobre as minhas escolhas, mostrando-me sempre a direção da paz e da retidão."},{id:"sb5",t:"Mente de Cristo",r:"1 Coríntios 2:16",m:"Pai, peço que eu tenha a mente de Cristo. Que os meus valores sejam os Teus e que eu veja o mundo e as pessoas através da Tua ótica de amor e sabedoria. Purifica a minha mente de preconceitos e ideias vãs, enchendo-a com pensamentos que te glorifiquem."},{id:"sb6",t:"Olhos",r:"Efésios 1:18",m:"Senhor, ilumina os olhos do meu coração para que eu saiba qual é a esperança da Tua vocação. Dá-me clareza sobre o meu propósito na terra e sabedoria para usar os meus talentos da melhor maneira possível para servir ao próximo e edificar o Teu Reino."},{id:"sb7",t:"Conselho",r:"Salmos 73:24",m:"Deus, guia-me com o Teu conselho e, depois, recebe-me na Tua glória. Agradeço porque não preciso caminhar às cegas, pois a Tua palavra é lâmpada para os meus pés. Que eu tenha a humildade de sempre te consultar antes de tomar qualquer passo importante."},{id:"sb8",t:"Verdade",r:"João 16:13",m:"Espírito Santo, guia-me a toda a verdade. Afasta de mim todo o engano e toda a mentira. Que eu tenha sabedoria para interpretar a realidade de forma correta e para ser uma pessoa íntegra e verdadeira em todas as minhas palavras e ações cotidianas. Amém."},{id:"sb9",t:"Prudência",r:"Provérbios 8:12",m:"Senhor, que a prudência habite comigo. Ajuda-me a controlar a minha língua e a falar apenas o que for útil para edificar. Dá-me sabedoria para saber o momento de falar e o momento de calar, agindo com equilíbrio e moderação em todos os meus diálogos."},{id:"sb10",t:"Temor",r:"Salmos 111:10",m:"Deus, entendo que o temor ao Senhor é o princípio da sabedoria. Que o meu respeito e amor por Ti me guiem em todas as minhas atitudes. Que eu tenha um bom entendimento por praticar os Teus mandamentos, vivendo uma vida de sabedoria prática e santidade."}],
            forca: [{id:"fc1",t:"Coragem",r:"Josué 1:9",m:"Senhor, quando me sentir fraco e desanimado, lembra-me de que Tua força se aperfeiçoa na minha fraqueza. Dá-me coragem para enfrentar os desafios de hoje e perseverança para não desistir. Sei que não estou sozinho nesta batalha, pois Tu és a minha rocha."},{id:"fc2",t:"Poder",r:"Filipenses 4:13",m:"Pai, eu declaro que tudo posso Naquele que me fortalece. Não por minha própria capacidade, mas pelo Teu poder que opera em mim. Quando os obstáculos parecerem instransponíveis, renova a minha fé e dá-me a força necessária para vencer cada etapa da minha jornada."},{id:"fc3",t:"Renovação",r:"Isaías 40:29",m:"Deus, Tu dás força ao cansado e multiplicas o poder ao que não tem nenhum vigor. Peço esse renovo agora. Que o meu ânimo seja restaurado e que eu sinta a Tua mão me levantando acima das dificuldades. Minha confiança está na Tua força infinita. Amém."},{id:"fc4",t:"Braço Forte",r:"Efésios 6:10",m:"Senhor, eu me fortaleço no Senhor e na força do Teu poder. Reveste-me com a Tua armadura para que eu possa resistir nos dias maus. Que a Tua presença seja a minha proteção e que eu caminhe com a firmeza de quem sabe que o Deus luta as suas guerras."},{id:"fc5",t:"Resiliência",r:"2 Coríntios 12:9",m:"Pai, obrigado porque a Tua graça me basta. Ensina-me a ser resiliente e a encontrar força mesmo nas fraquezas. Que eu não me abale com as críticas ou perseguições, mas que eu me glorie no Teu poder que me sustenta e me faz prevalecer sobre toda adversidade."},{id:"fc6",t:"Rocha",r:"Salmos 18:2",m:"Senhor, Tu és o meu rochedo, a minha fortaleza e o meu libertador. O meu Deus, o meu baluarte, em quem me refugio. Agradeço por ser essa base sólida em minha vida. Com a Tua força, sinto-me seguro para enfrentar qualquer tempestade que tente me derrubar."},{id:"fc7",t:"Inabalável",r:"Salmos 125:1",m:"Deus, que eu seja como o monte de Sião, que não se abala, mas permanece para sempre. Firma os meus pés na Tua verdade para que as circunstâncias externas não roubem a minha estabilidade. Que a minha força venha da comunhão constante Contigo, o Deus inabalável."},{id:"fc8",t:"Bom Ânimo",r:"João 16:33",m:"Jesus, obrigado por vencer o mundo por mim. Em meio às aflições, peço que me dês bom ânimo. Que eu não perca a esperança nem a motivação para continuar fazendo o bem. Tua vitória é a garantia da minha força para superar os desafios diários da vida. Amém."},{id:"fc9",t:"Sustento",r:"Salmos 55:22",m:"Senhor, entrego o meu fardo a Ti. Sustenta-me conforme a Tua promessa de que nunca permitirás que o justo seja abalado. Tira o peso dos meus ombros e coloca em mim a leveza da Tua força. Confio que o Senhor cuidará de tudo enquanto eu sigo em frente."},{id:"fc10",t:"Armadura",r:"Efésios 6:11",m:"Deus, revisto-me de toda a armadura de Deus. Que o cinto da verdade, a couraça da justiça e o escudo da fé me fortaleçam hoje. Que a espada do Espírito, que é a Tua palavra, me dê a força necessária para discernir e vencer as ciladas do inimigo em meu caminho."}],
            filhos: [{id:"fh1",t:"Proteção",r:"Salmos 127:3",m:"Pai amado, entrego meus filhos em Tuas mãos. Guarda-os no mundo, livra-os das más influências e guia os passos deles no caminho da retidão. Que eles cresçam em sabedoria, estatura e graça diante de Ti e dos homens. Abençoa o futuro deles e que sejam luz."},{id:"fh2",t:"Cuidado",r:"Isaías 49:15",m:"Senhor, Tu disseste que nunca te esquecerias de nós. Peço que esse mesmo cuidado eterno esteja sobre meus filhos. Quando eu não puder estar presente, que os Teus anjos os guardem. Que eles sintam o Teu amor maternal e paternal em cada momento de suas vidas. Amém."},{id:"fh3",t:"Bênção",r:"Deuteronômio 28:4",m:"Deus de promessas, abençoa o fruto do meu ventre e a minha descendência. Que meus filhos sejam benditos em tudo o que fizerem. Que a Tua prosperidade e a Tua paz os alcancem, e que eles vivam para ver as Tuas maravilhas na terra, honrando o nome do Senhor."},{id:"fh4",t:"Crescimento",r:"Lucas 2:52",m:"Pai, peço que meus filhos se desenvolvam de forma equilibrada — física, mental e espiritualmente. Protege a saúde deles e dá-lhes uma mente brilhante e um coração sensível à Tua voz. Que o crescimento deles seja motivo de alegria para nossa família e para o Teu Reino."},{id:"fh5",t:"Futuro",r:"Jeremias 29:11",m:"Senhor, Tu tens pensamentos de paz e não de mal sobre meus filhos, para lhes dar um futuro e uma esperança. Eu descanso nessa promessa. Que eles encontrem a vocação deles em Ti e que o futuro deles seja brilhante, marcado pela Tua presença e direção constante. Amém."},{id:"fh6",t:"Ensino",r:"Deuteronômio 6:7",m:"Pai, ajuda-me a ser um instrutor fiel para meus filhos. Que eu saiba falar das Tuas palavras ao deitar e ao levantar. Dá-me paciência e sabedoria para educá-los no temor do Senhor, para que, quando crescerem, não se desviem do caminho da vida e da verdade."},{id:"fh7",t:"Promessa",r:"Atos 2:39",m:"Deus fiel, agradeço porque a Tua promessa é para nós e para nossos filhos. Peço pela salvação e pelo selo do Espírito Santo sobre a vida de cada um deles. Que eles tenham um encontro real Contigo e que a fé seja a herança mais preciosa que eles recebam de mim."},{id:"fh8",t:"Paz",r:"Isaías 54:13",m:"Senhor, que todos os meus filhos sejam ensinados pelo Senhor e que a paz deles seja abundante. Livra-os do medo, da insegurança e de todo o trauma. Que eles vivam uma infância e uma juventude tranquilas, sob o abrigo do Altíssimo e a sombra do Onipotente."},{id:"fh9",t:"Luz",r:"Mateus 5:14",m:"Pai, que meus filhos sejam como cidades edificadas sobre um monte, que não podem se esconder. Que eles reflitam a Tua luz na escola, entre os amigos e na sociedade. Que o caráter de Cristo seja formado neles, tornando-os influências positivas e canais de bênção."},{id:"fh10",t:"Aliança",r:"Isaías 59:21",m:"Senhor, eu selo esta aliança Contigo: que as Tuas palavras que puseste na minha boca não se desviem da minha boca, nem da boca dos meus filhos e nem da boca dos filhos de meus filhos. Que a Tua verdade permaneça em nossa família para sempre, de geração em geração. Amém."}]
        };
        const mensagensInspiradoras = ["Deus tem um plano maior para você.", "A oração abre todas as portas.", "Sua fé é sua maior força.", "Deus não dorme.", "Onde há fé, há milagres."];
        let favorites = JSON.parse(localStorage.getItem('ore_favs')) || [];
        let currentOra = null;
        function applyInitialTheme() {
            const savedTheme = localStorage.getItem('ore_theme') || 'light';
            if (savedTheme === 'dark') { document.body.classList.add('dark-mode'); document.getElementById('theme-icon').innerText = '🌙'; document.getElementById('theme-text').innerText = 'Modo Escuro'; }
        }
        function toggleTheme() {
            const isDark = document.body.classList.toggle('dark-mode');
            const icon = document.getElementById('theme-icon');
            const text = document.getElementById('theme-text');
            if (isDark) { icon.innerText = '🌙'; text.innerText = 'Modo Escuro'; localStorage.setItem('ore_theme', 'dark'); } 
            else { icon.innerText = '☀️'; text.innerText = 'Modo Claro'; localStorage.setItem('ore_theme', 'light'); }
        }
        function showToast(msg) { const t = document.getElementById('toast'); t.innerText = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); }
        function show(id, el) { 
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); 
            document.getElementById(id).classList.add('active'); 
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); 
            if(el) el.classList.add('active'); 
            if(id === 'home') rotacionarMensagem(); 
            if(id === 'list') { document.getElementById('cat-menu').style.display = 'grid'; document.getElementById('ora-container').style.display = 'none'; } 
            else if(id === 'favs') renderFavs(); 
            document.getElementById('main-content').scrollTop = 0;
        }
        function rotacionarMensagem() { const index = Math.floor(Math.random() * mensagensInspiradoras.length); document.getElementById('msg-dia').innerText = `"${mensagensInspiradoras[index]}"`; }
        function openCat(cat) { 
            document.getElementById('cat-menu').style.display = 'none'; 
            const container = document.getElementById('ora-container'); 
            container.style.display = 'block'; 
            container.innerHTML = `<button onclick="backToMenu()" style="border:none;background:none;color:var(--p);font-weight:700;margin-bottom:15px;cursor:pointer;">← Voltar</button>`; 
            db[cat].forEach(o => { 
                const div = document.createElement('div'); div.className = 'ora-item'; 
                div.innerHTML = `<strong>${o.t}</strong><small>${o.r}</small>`; 
                div.onclick = () => openModal(o); container.appendChild(div); 
            }); 
            document.getElementById('main-content').scrollTop = 0;
        }
        function backToMenu() { document.getElementById('ora-container').style.display = 'none'; document.getElementById('cat-menu').style.display = 'grid'; }
        function openModal(o) { currentOra = o; document.getElementById('mt').innerText = o.t; document.getElementById('mm').innerText = o.m; document.getElementById('mr').innerText = o.r; updateModalHeart(); document.getElementById('modal').style.display = 'flex'; }
        function updateModalHeart() { const isFav = favorites.find(f => f.id === currentOra.id); const btn = document.getElementById('btn-fav-modal'); btn.innerHTML = isFav ? '⭐' : '☆'; btn.style.color = isFav ? 'var(--f)' : '#ccc'; }
        document.getElementById('btn-fav-modal').onclick = (e) => { e.stopPropagation(); const index = favorites.findIndex(f => f.id === currentOra.id); if(index > -1) { favorites.splice(index, 1); showToast("Removido"); } else { favorites.push(currentOra); showToast("Salvo!"); } localStorage.setItem('ore_favs', JSON.stringify(favorites)); updateModalHeart(); if(document.querySelector('.screen.active').id === 'favs') renderFavs(); };
        function renderFavs() { const container = document.getElementById('fav-list'); if(favorites.length === 0) { container.innerHTML = "<p style='text-align:center; opacity:0.5; margin-top:30px;'>Sem favoritos.</p>"; return; } container.innerHTML = ""; favorites.forEach(o => { const div = document.createElement('div'); div.className = 'ora-item'; div.innerHTML = `<strong>${o.t}</strong><small>${o.r}</small>`; div.onclick = () => openModal(o); container.appendChild(div); }); }
        function closeM() { document.getElementById('modal').style.display = 'none'; }
        function copyPix(chave) { navigator.clipboard.writeText(chave).then(() => { showToast("PIX Copiado!"); }); }
        function randomO() { const cats = Object.keys(db); const rCat = db[cats[Math.floor(Math.random() * cats.length)]]; const rOra = rCat[Math.floor(Math.random() * rCat.length)]; openModal(rOra); }
        function shareApp() { const t = "Fortaleça sua fé com o app Ore Comigo! " + window.location.href; window.open("https://wa.me/?text=" + encodeURIComponent(t)); }
        window.onload = () => { applyInitialTheme(); rotacionarMensagem(); };
    </script>
</body>
</html>
