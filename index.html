<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ore Comigo | Oficial</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --p: #6d8299; --a: #d4a373; --bg: #f4f7f6; --w: #ffffff; 
            --t: #2d3436; --h: #e74c3c; --f: #f1c40f; --s: #27ae60; 
            --modal-bg: rgba(0,0,0,0.4); 
            --item-bg: rgba(109,130,153,0.08);
        }
        body.dark-mode { 
            --bg: #1a1a2e; --w: #16213e; --t: #e9ecef; 
            --p: #a2b2c8; --modal-bg: rgba(0,0,0,0.7); 
            --item-bg: rgba(255,255,255,0.05);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--t); display: flex; height: 100vh; overflow: hidden; transition: background 0.4s, color 0.4s; }
        
        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #2d3436; color: white; padding: 10px 20px; border-radius: 25px; font-size: 13px; font-weight: 600; z-index: 3000; opacity: 0; transition: 0.3s; pointer-events: none; }
        #toast.show { opacity: 1; top: 30px; }

        .sidebar { width: 175px; background: var(--w); border-right: 1px solid rgba(0,0,0,0.05); height: 100vh; position: fixed; left: 0; top: 0; display: flex; flex-direction: column; padding: 15px 10px; z-index: 1000; }
        .sidebar h1 { font-family: 'Playfair Display'; color: var(--p); text-align: center; margin-bottom: 20px; font-size: 22px; letter-spacing: -0.5px; padding-bottom: 8px; border-bottom: 1px solid var(--item-bg); }
        
        .nav-group { display: flex; flex-direction: column; gap: 8px; }
        .nav-item { padding: 10px 12px; border-radius: 12px; cursor: pointer; color: var(--t); font-weight: 700; font-size: 12px; display: flex; align-items: center; gap: 8px; transition: 0.2s; background: var(--item-bg); }
        .nav-item.active { background: var(--p); color: white; box-shadow: 0 4px 10px rgba(109,130,153,0.15); }
        .item-apoio { background: rgba(231, 76, 60, 0.08); color: var(--h); }
        .item-share { background: rgba(39, 174, 96, 0.08); color: var(--s); }
        .item-theme { border: 1px dashed rgba(0,0,0,0.1); background: transparent; }

        main { flex: 1; margin-left: 175px; padding: 15px; height: 100vh; overflow-y: auto; display: flex; justify-content: center; }
        .screen { display: none; width: 100%; max-width: 400px; animation: fadeIn 0.4s ease-out; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; padding-bottom: 25px; }
        .card-cat { background: var(--w); padding: 15px 5px; border-radius: 18px; text-align: center; cursor: pointer; border: 1px solid rgba(0,0,0,0.05); transition: 0.2s; }
        .card-cat div { font-size: 22px; margin-bottom: 5px; }
        .card-cat span { display: block; font-weight: 700; font-size: 9px; color: var(--p); text-transform: uppercase; letter-spacing: 0.4px; white-space: nowrap; }

        /* LISTA DE ORAÇÕES AJUSTADA */
        .ora-item { background: var(--w); padding: 12px 15px; border-radius: 14px; margin-bottom: 10px; cursor: pointer; border-left: 4px solid var(--p); box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .ora-item strong { display: block; font-size: 14px; color: var(--t); margin-bottom: 2px; }
        .ora-item small { display: block; font-size: 11px; color: var(--a); font-weight: 600; }
        
        .btn-back { background: none; border: none; color: var(--p); font-weight: 700; font-size: 14px; cursor: pointer; margin-bottom: 15px; display: flex; align-items: center; gap: 5px; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--modal-bg); z-index: 2000; justify-content: center; align-items: center; padding: 20px; backdrop-filter: blur(8px); }
        .m-box { background: var(--w); padding: 25px; border-radius: 25px; width: 100%; max-width: 330px; text-align: center; position: relative; }
        .btn-amen { margin-top: 20px; padding: 12px 35px; border: none; background: var(--p); color: white; border-radius: 20px; font-weight: 700; cursor: pointer; font-size: 14px; }

        @media (max-width: 600px) { 
            .sidebar { width: 150px; padding: 15px 8px; } 
            main { margin-left: 150px; padding: 15px 10px; } 
            .sidebar h1 { font-size: 18px; }
            .nav-item { font-size: 10.5px; padding: 9px 8px; }
            .ora-item strong { font-size: 13px; }
        }
    </style>
</head>
<body id="app-body">
    <div id="toast">Ação realizada!</div>

    <aside class="sidebar">
        <h1>Ore Comigo</h1>
        <div class="nav-group">
            <div class="nav-item active" onclick="show('home', this)">🏠 Início</div>
            <div class="nav-item" onclick="show('list', this)">📖 Orações</div>
            <div class="nav-item" onclick="show('favs', this)">⭐ Favoritos</div>
            <div class="nav-item item-apoio" onclick="show('donate', this)">❤️ Apoie o Projeto</div>
            <div class="nav-item item-share" onclick="shareApp()">🔗 Compartilhar</div>
            <div class="nav-item item-theme" onclick="toggleTheme()">
                <span id="theme-icon">☀️</span> <span id="theme-text">Modo Claro</span>
            </div>
        </div>
    </aside>

    <main>
        <section id="home" class="screen active">
            <div style="background: linear-gradient(135deg, #6d8299, #8da9c4); color:white; padding:35px 20px; border-radius:25px; text-align:center;">
                <h2 style="font-family:'Playfair Display'; font-size: 22px;">Seja Bem-vindo</h2>
                <div style="height: 2px; background: rgba(255,255,255,0.3); width: 30px; margin: 12px auto;"></div>
                <p id="msg-dia" style="font-size:14px; font-style:italic; min-height: 45px; display: flex; align-items: center; justify-content: center;"></p>
            </div>
            <div style="margin-top: 25px; text-align: center;">
                <button onclick="randomO()" style="background: var(--w); border: 1px solid rgba(0,0,0,0.08); padding: 18px; border-radius: 22px; width: 100%; color: var(--p); font-weight: 700; font-size: 14px; cursor: pointer;">✨ Receber uma Palavra</button>
            </div>
        </section>

        <section id="list" class="screen">
            <div id="cat-menu">
                <div class="grid">
                    <div class="card-cat" onclick="openCat('paz')"><div>🕊️</div><span>PAZ</span></div>
                    <div class="card-cat" onclick="openCat('familia')"><div>🏠</div><span>FAMÍLIA</span></div>
                    <div class="card-cat" onclick="openCat('gratidao')"><div>🙏</div><span>GRATIDÃO</span></div>
                    <div class="card-cat" onclick="openCat('perdao')"><div>🔓</div><span>PERDÃO</span></div>
                    <div class="card-cat" onclick="openCat('prosperidade')"><div>💰</div><span>PROSPERIDADE</span></div>
                    <div class="card-cat" onclick="openCat('saude')"><div>🌿</div><span>SAÚDE</span></div>
                    <div class="card-cat" onclick="openCat('protecao')"><div>🛡️</div><span>PROTEÇÃO</span></div>
                    <div class="card-cat" onclick="openCat('sabedoria')"><div>💡</div><span>SABEDORIA</span></div>
                    <div class="card-cat" onclick="openCat('forca')"><div>💪</div><span>FORÇA</span></div>
                    <div class="card-cat" onclick="openCat('filhos')"><div>👶</div><span>FILHOS</span></div>
                </div>
            </div>
            <div id="ora-container"></div>
        </section>

        <section id="favs" class="screen"><h3 style="text-align:center; font-family:'Playfair Display'; color:var(--p); font-size: 20px; margin-bottom: 20px;">Favoritos</h3><div id="fav-list"></div></section>
        
        <section id="donate" class="screen"><h3 style="text-align:center; font-family:'Playfair Display'; color:var(--p); font-size: 20px;">Apoie o Projeto</h3><div style="cursor:pointer; padding:30px 20px; border:2px solid var(--p); border-radius:22px; text-align:center; margin-top:20px; background:var(--w);" onclick="copyPix('65173337000146')"><p style="font-weight:700; color:var(--p); font-size: 14px;">✨ Toque para copiar o PIX</p></div></section>
    </main>

    <div id="modal" class="modal" onclick="closeM()"><div class="m-box" onclick="event.stopPropagation()"><div id="btn-fav-modal" style="position:absolute; top:15px; right:15px; font-size:24px; cursor:pointer;">☆</div><h3 id="mt" style="color:var(--p); margin-bottom:12px; font-family:'Playfair Display'; font-size: 18px;"></h3><p id="mm" style="font-size:15px; line-height:1.6;"></p><small id="mr" style="display:block; margin-top:18px; color:var(--a); font-weight:700; font-size: 12px;"></small><button class="btn-amen" onclick="closeM()">Amém</button></div></div>

    <script>
        const db = {
            paz: [{id:"p1",t:"Paz no Coração",r:"João 14:27",m:"Deixo-vos a paz, a minha paz vos dou."}, {id:"p2",t:"Descanso em Deus",r:"Salmos 4:8",m:"Em paz me deito e logo pego no sono."}, {id:"p3",t:"Calma na Alma",r:"Filipenses 4:7",m:"A paz de Deus guardará o seu coração."}, {id:"p4",t:"Refúgio Seguro",r:"Salmos 91:1",m:"Aquele que habita no Altíssimo descansará."}, {id:"p5",t:"Serenidade",r:"Mateus 11:28",m:"Vinde a mim e eu vos aliviarei."}, {id:"p6",t:"Confiança",r:"Isaías 26:3",m:"Tu conservarás em paz aquele que confia em Ti."}, {id:"p7",t:"Silêncio de Deus",r:"Salmos 46:10",m:"Aquietai-vos e sabei que eu sou Deus."}, {id:"p8",t:"Luz na Escuridão",r:"João 8:12",m:"Quem me segue não andará em trevas."}, {id:"p9",t:"Consolo",r:"Salmos 23:4",m:"Tua vara e teu cajado me consolam."}, {id:"p10",t:"Paz Profunda",r:"Colossenses 3:15",m:"Que a paz de Cristo seja o juiz em seu coração."}],
            familia: [{id:"f1",t:"Bênção para o Lar",r:"Josué 24:15",m:"Eu e a minha casa serviremos ao Senhor."}, {id:"f2",t:"União",r:"Salmos 133:1",m:"Quão bom é que os irmãos vivam em união."}, {id:"f3",t:"Proteção Familiar",r:"Números 6:24",m:"O Senhor te abençoe e te guarde."}, {id:"f4",t:"Amor no Lar",r:"1 Coríntios 13:13",m:"O maior destes é o amor."}, {id:"f5",t:"Sabedoria para Pais",r:"Provérbios 22:6",m:"Ensina a criança no caminho em que deve andar."}, {id:"f6",t:"Respeito",r:"Efésios 6:1",m:"Filhos, obedecei a vossos pais no Senhor."}, {id:"f7",t:"Paz na Família",r:"Provérbios 15:1",m:"A resposta branda desvia o furor."}, {id:"f8",t:"Prosperidade no Lar",r:"Salmos 128:3",m:"Tua mulher será como a videira frutífera."}, {id:"f9",t:"Edificação",r:"Provérbios 14:1",m:"A mulher sábia edifica a sua casa."}, {id:"f10",t:"Aliança Eterna",r:"Gênesis 17:7",m:"Serei o teu Deus e da tua descendência."}],
            gratidao: [{id:"g1",t:"Gratidão Diária",r:"1 Tess. 5:18",m:"Em tudo dai graças."}, {id:"g2",t:"Coração Grato",r:"Salmos 100:4",m:"Entrai pelas portas dele com louvor."}, {id:"g3",t:"Pelo Pão",r:"Mateus 6:11",m:"O pão nosso de cada dia nos dá hoje."}, {id:"g4",t:"Pela Vida",r:"Salmos 118:24",m:"Este é o dia que o Senhor fez."}, {id:"g5",t:"Pelas Bênçãos",r:"Salmos 103:2",m:"Não se esqueça de nenhum de seus benefícios."}, {id:"g6",t:"Pela Salvação",r:"João 3:16",m:"Deus amou o mundo de tal maneira."}, {id:"g7",t:"Pela Força",r:"Salmos 28:7",m:"O Senhor é a minha força e o meu escudo."}, {id:"g8",t:"Pelo Socorro",r:"Salmos 121:1",m:"Meu socorro vem do Senhor."}, {id:"g9",t:"Pela Paz",r:"2 Tess. 3:16",m:"O Senhor da paz vos dê sempre paz."}, {id:"g10",t:"Pelo Amor",r:"1 João 4:19",m:"Nós o amamos porque ele nos amou primeiro."}],
            perdao: [{id:"pe1",t:"Coração Puro",r:"Salmos 51:10",m:"Cria em mim, ó Deus, um coração puro."}, {id:"pe2",t:"Perdoar Sempre",r:"Mateus 18:22",m:"Não até sete, mas até setenta vezes sete."}, {id:"pe3",t:"Misericórdia",r:"Lucas 6:36",m:"Sede misericordiosos como vosso Pai."}, {id:"pe4",t:"Libertação",r:"João 8:36",m:"Se o Filho vos libertar, sereis livres."}, {id:"pe5",t:"Arrependimento",r:"1 João 1:9",m:"Ele é fiel e justo para nos perdoar."}, {id:"pe6",t:"Novas Criaturas",r:"2 Cor. 5:17",m:"As coisas velhas já passaram."}, {id:"pe7",t:"Paz com o Próximo",r:"Efésios 4:32",m:"Perdoando-vos uns aos outros."}, {id:"pe8",t:"Limpeza da Alma",r:"Isaías 1:18",m:"Seus pecados se tornarão brancos como a neve."}, {id:"pe9",t:"Amor que Perdoa",r:"1 Pedro 4:8",m:"O amor cobre multidão de pecados."}, {id:"pe10",t:"Recomeço",r:"Lamentações 3:22",m:"Suas misericórdias se renovam cada manhã."}],
            prosperidade: [{id:"pr1",t:"Portas de Trabalho",r:"Salmos 90:17",m:"Confirma, Senhor, a obra das nossas mãos."}, {id:"pr2",t:"Abundância",r:"Filipenses 4:19",m:"Deus suprirá todas as vossas necessidades."}, {id:"pr3",t:"Sucesso",r:"Josué 1:8",m:"Então farás prosperar o teu caminho."}, {id:"pr4",t:"Semeadura",r:"2 Coríntios 9:6",m:"O que semeia com fartura, com fartura colherá."}, {id:"pr5",t:"Honra",r:"Provérbios 3:9",m:"Honra ao Senhor com os teus bens."}, {id:"pr6",t:"Riquezas de Deus",r:"Deuteronômio 8:18",m:"Ele é o que te dá força para adquirires riqueza."}, {id:"pr7",t:"Fidelidade",r:"Malaquias 3:10",m:"Trazei todos os dízimos à casa do tesouro."}, {id:"pr8",t:"Caminho da Fartura",r:"Salmos 23:5",m:"O meu cálice transborda."}, {id:"pr9",t:"Bênção no Campo",r:"Deuteronômio 28:3",m:"Bendito serás na cidade e no campo."}, {id:"pr10",t:"Provisão Fiel",r:"Mateus 6:33",m:"Buscai primeiro o reino de Deus."}],
            saude: [{id:"s1",t:"Cura Divina",r:"Êxodo 15:26",m:"Eu sou o Senhor, aquele que te cura."}, {id:"s2",t:"Restauração",r:"Jeremias 30:17",m:"Te restaurarei a saúde e curarei as tuas chagas."}, {id:"s3",t:"Vigor",r:"Isaías 40:31",m:"Os que esperam no Senhor renovarão as forças."}, {id:"s4",t:"Saúde da Alma",r:"Provérbios 4:22",m:"São vida para quem as acha e saúde para o seu corpo."}, {id:"s5",t:"Fé que Cura",r:"Mateus 9:22",m:"A tua fé te salvou."}, {id:"s6",t:"Fortalecimento",r:"Salmos 147:3",m:"Ele sara os quebrantados de coração."}, {id:"s7",t:"Paz e Saúde",r:"3 João 1:2",m:"Desejo que tenhas saúde, assim como bem vai a tua alma."}, {id:"s8",t:"Alívio",r:"Mateus 11:28",m:"Vinde a mim e eu vos aliviarei."}, {id:"s9",t:"Toque de Cura",r:"Marcos 5:34",m:"Vai-te em paz e sê curada do teu mal."}, {id:"s10",t:"Proteção do Corpo",r:"1 Coríntios 6:19",m:"Vosso corpo é o templo do Espírito Santo."}],
            protecao: [{id:"pt1",t:"Anjos ao Redor",r:"Salmos 34:7",m:"O anjo do Senhor acampa-se ao redor dos que o temem."}, {id:"pt2",t:"Escudo Fiel",r:"Salmos 91:4",m:"A sua fidelidade é escudo e broquel."}, {id:"pt3",t:"Livramento",r:"Salmos 121:7",m:"O Senhor te guardará de todo o mal."}, {id:"pt4",t:"Torre Forte",r:"Provérbios 18:10",m:"Torre forte é o nome do Senhor."}, {id:"pt5",t:"Cuidado de Deus",r:"1 Pedro 5:7",m:"Lançando sobre ele toda a vossa ansiedade."}, {id:"pt6",t:"Presença Real",r:"Mateus 28:20",m:"Eis que estou convosco todos os dias."}, {id:"pt7",t:"Segurança",r:"Provérbios 1:33",m:"O que me der ouvidos habitará seguro."}, {id:"pt8",t:"Vitória",r:"Romanos 8:31",m:"Se Deus é por nós, quem será contra nós?"}, {id:"pt9",t:"Muro de Fogo",r:"Zacarias 2:5",m:"Eu serei para ela um muro de fogo em redor."}, {id:"pt10",t:"Guarda Fiel",r:"Salmos 121:4",m:"Eis que não tosquenejará nem dormirá o guarda de Israel."}],
            sabedoria: [{id:"sb1",t:"Busca por Direção",r:"Tiago 1:5",m:"Se algum de vós tem falta de sabedoria, peça-a a Deus."}, {id:"sb2",t:"Discernimento",r:"Provérbios 2:6",m:"O Senhor dá a sabedoria."}, {id:"sb3",t:"Entendimento",r:"Provérbios 4:7",m:"A sabedoria é a coisa principal."}, {id:"sb4",t:"Caminho Certo",r:"Salmos 32:8",m:"Instruir-te-ei e ensinar-te-ei o caminho."}, {id:"sb5",t:"Mente de Cristo",r:"1 Coríntios 2:16",m:"Nós temos a mente de Cristo."}, {id:"sb6",t:"Luz no Olhar",r:"Efésios 1:18",m:"Iluminados os olhos do vosso coração."}, {id:"sb7",t:"Conselho",r:"Salmos 73:24",m:"Guiar-me-ás com o teu conselho."}, {id:"sb8",t:"Verdade",r:"João 16:13",m:"Ele vos guiará a toda a verdade."}, {id:"sb9",t:"Prudência",r:"Provérbios 8:12",m:"Eu, a sabedoria, habito com a prudência."}, {id:"sb10",t:"Temor ao Senhor",r:"Salmos 111:10",m:"O temor do Senhor é o princípio da sabedoria."}],
            forca: [{id:"fc1",t:"Coragem",r:"Josué 1:9",m:"Esforça-te e tem bom ânimo; não temas."}, {id:"fc2",t:"Poder de Deus",r:"Filipenses 4:13",m:"Tudo posso naquele que me fortalece."}, {id:"fc3",t:"Renovação",r:"Isaías 40:29",m:"Ele dá força ao cansado."}, {id:"fc4",t:"Braço Forte",r:"Efésios 6:10",m:"Fortalecei-vos no Senhor."}, {id:"fc5",t:"Resiliência",r:"2 Coríntios 12:9",m:"O meu poder se aperfeiçoa na fraqueza."}, {id:"fc6",t:"Rocha",r:"Salmos 18:2",m:"O Senhor é o meu rochedo e a minha fortaleza."}, {id:"fc7",t:"Inabalável",r:"Salmos 125:1",m:"Serão como o monte de Sião, que não se abala."}, {id:"fc8",t:"Ânimo",r:"João 16:33",m:"Tenha bom ânimo; eu venci o mundo."}, {id:"fc9",t:"Sustento",r:"Salmos 55:22",m:"Lança o teu cuidado sobre o Senhor."}, {id:"fc10",t:"Armadura",r:"Efésios 6:11",m:"Revesti-vos de toda a armadura de Deus."}],
            filhos: [{id:"fh1",t:"Herança do Senhor",r:"Salmos 127:3",m:"Eis que os filhos são herança do Senhor."}, {id:"fh2",t:"Cuidado Materno",r:"Isaías 49:15",m:"Acaso pode uma mulher esquecer-se do filho?"}, {id:"fh3",t:"Bênção na Prole",r:"Deuteronômio 28:4",m:"Bendito o fruto do teu ventre."}, {id:"fh4",t:"Crescimento",r:"Lucas 2:52",m:"Crescia em sabedoria, estatura e graça."}, {id:"fh5",t:"Futuro",r:"Jeremias 29:11",m:"Eu sei os pensamentos que tenho sobre vós."}, {id:"fh6",t:"Ensino",r:"Deuteronômio 6:7",m:"As ensinarás a teus filhos."}, {id:"fh7",t:"Promessa",r:"Atos 2:39",m:"A promessa diz respeito a vós e a vossos filhos."}, {id:"fh8",t:"Paz para os Filhos",r:"Isaías 54:13",m:"A paz de teus filhos será abundante."}, {id:"fh9",t:"Luz para o Mundo",r:"Mateus 5:14",m:"Vós sois a luz do mundo."}, {id:"fh10",t:"Aliança",r:"Isaías 59:21",m:"Minhas palavras não se desviarão da tua descendência."}]
        };

        const mensagensInspiradoras = ["Deus tem um plano maior para você.", "A oração abre todas as portas.", "Sua fé é sua maior força.", "Deus não dorme.", "Onde há fé, há milagres."];
        let favorites = JSON.parse(localStorage.getItem('ore_favs')) || [];
        let currentOra = null;

        function applyInitialTheme() {
            const savedTheme = localStorage.getItem('ore_theme') || 'light';
            if (savedTheme === 'dark') { 
                document.body.classList.add('dark-mode'); 
                document.getElementById('theme-icon').innerText = '🌙'; 
                document.getElementById('theme-text').innerText = 'Modo Escuro';
            }
        }

        function toggleTheme() {
            const isDark = document.body.classList.toggle('dark-mode');
            const icon = document.getElementById('theme-icon');
            const text = document.getElementById('theme-text');
            if (isDark) { icon.innerText = '🌙'; text.innerText = 'Modo Escuro'; localStorage.setItem('ore_theme', 'dark'); } 
            else { icon.innerText = '☀️'; text.innerText = 'Modo Claro'; localStorage.setItem('ore_theme', 'light'); }
        }

        function showToast(msg) { const t = document.getElementById('toast'); t.innerText = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500); }
        function show(id, el) { 
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); 
            document.getElementById(id).classList.add('active'); 
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); 
            if(el) el.classList.add('active'); 
            if(id === 'home') rotacionarMensagem(); 
            if(id === 'list') { document.getElementById('cat-menu').style.display = 'block'; document.getElementById('ora-container').style.display = 'none'; } 
            else if(id === 'favs') renderFavs(); 
        }

        function rotacionarMensagem() { const index = Math.floor(Math.random() * mensagensInspiradoras.length); document.getElementById('msg-dia').innerText = `"${mensagensInspiradoras[index]}"`; }
        function openCat(cat) { 
            document.getElementById('cat-menu').style.display = 'none'; 
            const container = document.getElementById('ora-container'); 
            container.style.display = 'block'; 
            container.innerHTML = `<button class="btn-back" onclick="backToMenu()">← Voltar</button>`; 
            db[cat].forEach(o => { 
                const div = document.createElement('div'); 
                div.className = 'ora-item'; 
                div.innerHTML = `<strong>${o.t}</strong><small>${o.r}</small>`; 
                div.onclick = () => openModal(o); 
                container.appendChild(div); 
            }); 
            document.querySelector('main').scrollTop = 0;
        }

        function backToMenu() { document.getElementById('ora-container').style.display = 'none'; document.getElementById('cat-menu').style.display = 'block'; }
        function openModal(o, isSpecial = false) { currentOra = o; document.getElementById('mt').innerText = o.t; document.getElementById('mm').innerText = o.m; document.getElementById('mr').innerText = o.r; updateModalHeart(); document.getElementById('modal').style.display = 'flex'; }
        function updateModalHeart() { const isFav = favorites.find(f => f.id === currentOra.id); const btn = document.getElementById('btn-fav-modal'); btn.innerHTML = isFav ? '⭐' : '☆'; btn.style.color = isFav ? 'var(--f)' : '#ccc'; }
        document.getElementById('btn-fav-modal').onclick = (e) => { e.stopPropagation(); const index = favorites.findIndex(f => f.id === currentOra.id); if(index > -1) { favorites.splice(index, 1); showToast("Removido"); } else { favorites.push(currentOra); showToast("Salvo!"); } localStorage.setItem('ore_favs', JSON.stringify(favorites)); updateModalHeart(); if(document.querySelector('.screen.active').id === 'favs') renderFavs(); };
        function renderFavs() { const container = document.getElementById('fav-list'); if(favorites.length === 0) { container.innerHTML = "<p style='text-align:center; opacity:0.5; margin-top:30px; font-size:14px;'>Sem favoritos.</p>"; return; } container.innerHTML = ""; favorites.forEach(o => { const div = document.createElement('div'); div.className = 'ora-item'; div.innerHTML = `<strong>${o.t}</strong><small>${o.r}</small>`; div.onclick = () => openModal(o); container.appendChild(div); }); }
        function closeM() { document.getElementById('modal').style.display = 'none'; }
        function copyPix(chave) { navigator.clipboard.writeText(chave).then(() => { showToast("PIX Copiado!"); }); }
        function randomO() { const cats = Object.keys(db); const rCat = db[cats[Math.floor(Math.random() * cats.length)]]; const rOra = rCat[Math.floor(Math.random() * rCat.length)]; openModal(rOra, true); }
        function shareApp() { const t = "Fortaleça sua fé com o app Ore Comigo! " + window.location.href; window.open("https://wa.me/?text=" + encodeURIComponent(t)); }
        window.onload = () => { applyInitialTheme(); rotacionarMensagem(); };
    </script>
</body>
</html>
